<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สินค้า - IMS Stocker</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/premium.css" rel="stylesheet">
</head>
<body>
  <!-- Product Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">เพิ่มสินค้า</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" style="padding:24px;">
          <input type="hidden" id="productID">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">ชื่อสินค้า *</label>
              <input type="text" class="form-control" id="productName" placeholder="ชื่อสินค้า">
            </div>
            <div class="col-md-6">
              <label class="form-label">SKU / รหัสสินค้า</label>
              <input type="text" class="form-control" id="sku" placeholder="เช่น SKU-0001">
            </div>
            <div class="col-md-6">
              <label class="form-label">หมวดหมู่</label>
              <input type="text" class="form-control" id="category" placeholder="เช่น อิเล็กทรอนิกส์" list="categoryList">
              <datalist id="categoryList"></datalist>
            </div>
            <div class="col-md-6">
              <label class="form-label">หน่วยนับ</label>
              <input type="text" class="form-control" id="unit" placeholder="ชิ้น / กล่อง / แพ็ค">
            </div>
            <div class="col-md-4">
              <label class="form-label">จำนวนเริ่มต้น</label>
              <input type="number" class="form-control" id="quantity" value="0" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">ราคาทุน (฿)</label>
              <input type="number" class="form-control" id="costPrice" value="0" min="0" step="0.01">
            </div>
            <div class="col-md-4">
              <label class="form-label">ราคาขาย (฿)</label>
              <input type="number" class="form-control" id="sellPrice" value="0" min="0" step="0.01">
            </div>
            <div class="col-md-6">
              <label class="form-label">สถานที่จัดเก็บ</label>
              <input type="text" class="form-control" id="location" placeholder="เช่น ชั้น A-1">
            </div>
            <div class="col-md-6">
              <label class="form-label">จำนวนขั้นต่ำ (แจ้งเตือน)</label>
              <input type="number" class="form-control" id="minStock" value="5" min="0">
            </div>
            <div class="col-12">
              <label class="form-label">คำอธิบาย</label>
              <textarea class="form-control" id="description" rows="2" placeholder="คำอธิบายสินค้า (ไม่บังคับ)"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">URL รูปภาพ</label>
              <input type="url" class="form-control" id="imageURL" placeholder="https://...">
              <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">วาง URL รูปภาพจาก internet</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="button" class="btn btn-primary" onclick="saveProduct()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:-2px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            บันทึก
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
